name = "agentskin"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = [ "nodejs_compat" ]

# Dual-Domain Strategy
routes = [
	{ pattern = "agentskin.dev", custom_domain = true },
	{ pattern = "api.agentskin.dev", custom_domain = true }
]

[vars]
NODE_ENV = "production"
STRIPE_CHECKOUT_URL = "https://buy.stripe.com/test_..."

[observability]
enabled = true
