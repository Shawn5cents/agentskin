<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentSkin | The Semantic Layer for Agents</title>
    <!-- Agent-First Discovery Layer -->
    <link rel="alternate" type="text/plain" title="LLM Map" href="../docs/llms.txt">
    <meta name="ai-service" content="AgentSkin Semantic Proxy">
    <meta name="mcp-server" content="https://api.agentskin.dev/mcp">
    
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #00ff41; /* Classic Matrix/Agent Green */
            --dim-text: #008f11;
            --accent-color: #ffffff;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        header {
            width: 100%;
            max-width: 900px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 { margin: 0; font-size: 1.5rem; letter-spacing: 2px; }
        .status { font-size: 0.8rem; color: var(--accent-color); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .stat-box {
            border: 1px solid var(--border-color);
            padding: 15px;
            text-align: center;
        }

        .stat-value { font-size: 1.2rem; display: block; color: var(--accent-color); }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; color: var(--dim-text); }

        main {
            width: 100%;
            max-width: 900px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            background: rgba(0, 255, 65, 0.02);
            position: relative;
        }

        #activity-log {
            padding: 15px;
            font-size: 0.8rem;
            overflow-y: auto;
            flex-grow: 1;
            line-height: 1.5;
        }

        .log-entry { margin-bottom: 5px; border-left: 2px solid var(--dim-text); padding-left: 10px; }
        .log-time { color: var(--dim-text); margin-right: 10px; }
        .log-agent { color: var(--accent-color); font-weight: bold; }
        .log-action { color: var(--text-color); }

        footer {
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--dim-text);
        }

        a { color: var(--text-color); text-decoration: none; border-bottom: 1px solid var(--text-color); }
        a:hover { color: var(--accent-color); border-bottom-color: var(--accent-color); }
        
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.1);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            pointer-events: none;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            from { top: 0; }
            to { top: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>AGENT_SKIN_v2.2</h1>
            <div class="status">SYSTEM_STATUS: OPERATIONAL</div>
        </div>
        <div style="text-align: right">
            <div class="status">PROTOCOLS: MCP | AEO | A2A</div>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-value" id="stat-tokens">0</span>
            <span class="stat-label">Tokens Saved (Est)</span>
        </div>
        <div class="stat-box">
            <span class="stat-value" id="stat-agents">0</span>
            <span class="stat-label">Active Agents</span>
        </div>
        <div class="stat-box">
            <span class="stat-value" id="stat-uptime">00:00:00</span>
            <span class="stat-label">Node Uptime</span>
        </div>
    </div>

    <main>
        <div class="scanline"></div>
        <div id="activity-log">
            <div class="log-entry">Initializing Semantic Proxy Layer... OK</div>
            <div class="log-entry">Loading Zod Deterministic Schemas... OK</div>
            <div class="log-entry">Awaiting Agentic Connections...</div>
        </div>
    </main>

    <footer>
        <div>DISCOVERY: <a href="../docs/llms.txt">llms.txt</a> | <a href="../docs/skill.md">skill.md</a></div>
        <div>&copy; 2026 AGENT_SKIN_CORE</div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
